services:
  postgres:
    image: postgres:16
    container_name: ravoxzap-postgres
    ports:
      - "25432:5432"
    environment:
      POSTGRES_USER: ravoxzap
      POSTGRES_PASSWORD: ravoxzap
      POSTGRES_DB: ravoxzap
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ravoxzap-redis
    ports:
      - "26379:6379"

volumes:
  postgres_data:
